<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" width="900" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arRos" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#C9B7AD"/>
    </marker>
  </defs>

  <!-- card -->
  <rect x="2" y="2" width="896" height="466" rx="14" fill="#FAF9F7" stroke="#E7E2DC"/>

  <!-- title -->
  <text x="40" y="44" font-size="22" font-weight="700" fill="#1A1A1A">Agents &amp; Orchestration</text>
  <text x="40" y="67" font-size="14" fill="#6B7280">13 specialists, delegated by cadence beat under one delegation contract.</text>

  <!-- controller -->
  <rect x="340" y="84" width="220" height="44" rx="10" fill="#1A1A1A"/>
  <text x="450" y="112" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">Controller (the cadence)</text>

  <!-- branch arrows -->
  <g stroke="#C9B7AD" stroke-width="1.5">
    <line x1="450" y1="128" x2="135" y2="161" marker-end="url(#arRos)"/>
    <line x1="450" y1="128" x2="345" y2="161" marker-end="url(#arRos)"/>
    <line x1="450" y1="128" x2="555" y2="161" marker-end="url(#arRos)"/>
    <line x1="450" y1="128" x2="765" y2="161" marker-end="url(#arRos)"/>
  </g>

  <!-- column headers -->
  <g font-size="14" font-weight="700" text-anchor="middle">
    <rect x="40" y="164" width="190" height="38" rx="9" fill="#F6E5DD" stroke="#E7C9BB"/>
    <text x="135" y="188" fill="#B4502F">Frame</text>
    <rect x="250" y="164" width="190" height="38" rx="9" fill="#F6E5DD" stroke="#E7C9BB"/>
    <text x="345" y="188" fill="#B4502F">Forge</text>
    <rect x="460" y="164" width="190" height="38" rx="9" fill="#F6E5DD" stroke="#E7C9BB"/>
    <text x="555" y="188" fill="#B4502F">Prove</text>
    <rect x="670" y="164" width="190" height="38" rx="9" fill="#F6E5DD" stroke="#E7C9BB"/>
    <text x="765" y="188" fill="#B4502F">Sign-off</text>
  </g>

  <!-- agent chips -->
  <g font-size="12" font-weight="600" fill="#1A1A1A">
    <!-- Frame -->
    <rect x="40" y="216" width="190" height="34" rx="8" fill="#FFFFFF" stroke="#E7E2DC"/><circle cx="58" cy="233" r="5" fill="#B4502F"/><text x="74" y="237">planner</text>
    <rect x="40" y="258" width="190" height="34" rx="8" fill="#FFFFFF" stroke="#E7E2DC"/><circle cx="58" cy="275" r="5" fill="#3F7D9B"/><text x="74" y="279">researcher</text>
    <rect x="40" y="300" width="190" height="34" rx="8" fill="#FFFFFF" stroke="#E7E2DC"/><circle cx="58" cy="317" r="5" fill="#B4502F"/><text x="74" y="321">brainstormer</text>
    <rect x="40" y="342" width="190" height="34" rx="8" fill="#FFFFFF" stroke="#E7E2DC"/><circle cx="58" cy="359" r="5" fill="#3F7D9B"/><text x="74" y="363">designer</text>

    <!-- Forge -->
    <rect x="250" y="216" width="190" height="34" rx="8" fill="#FFFFFF" stroke="#E7E2DC"/><circle cx="268" cy="233" r="5" fill="#3F7D9B"/><text x="284" y="237">senior-fullstack-engineer</text>
    <rect x="250" y="258" width="190" height="34" rx="8" fill="#FFFFFF" stroke="#E7E2DC"/><circle cx="268" cy="275" r="5" fill="#3F7D9B"/><text x="284" y="279">code-simplifier</text>

    <!-- Prove -->
    <rect x="460" y="216" width="190" height="34" rx="8" fill="#FFFFFF" stroke="#E7E2DC"/><circle cx="478" cy="233" r="5" fill="#3F7D9B"/><text x="494" y="237">tester</text>
    <rect x="460" y="258" width="190" height="34" rx="8" fill="#FFFFFF" stroke="#E7E2DC"/><circle cx="478" cy="275" r="5" fill="#3F7D9B"/><text x="494" y="279">debugger</text>
    <rect x="460" y="300" width="190" height="34" rx="8" fill="#FFFFFF" stroke="#E7E2DC"/><circle cx="478" cy="317" r="5" fill="#3F7D9B"/><text x="494" y="321">code-reviewer</text>

    <!-- Sign-off -->
    <rect x="670" y="216" width="190" height="34" rx="8" fill="#FFFFFF" stroke="#E7E2DC"/><circle cx="688" cy="233" r="5" fill="#3F9B6B"/><text x="704" y="237">docs-manager</text>
    <rect x="670" y="258" width="190" height="34" rx="8" fill="#FFFFFF" stroke="#E7E2DC"/><circle cx="688" cy="275" r="5" fill="#3F9B6B"/><text x="704" y="279">git-manager</text>
    <rect x="670" y="300" width="190" height="34" rx="8" fill="#FFFFFF" stroke="#E7E2DC"/><circle cx="688" cy="317" r="5" fill="#3F9B6B"/><text x="704" y="321">journal-writer</text>
    <rect x="670" y="342" width="190" height="34" rx="8" fill="#FFFFFF" stroke="#E7E2DC"/><circle cx="688" cy="359" r="5" fill="#3F9B6B"/><text x="704" y="363">project-manager</text>
  </g>

  <!-- legend -->
  <g font-size="12" fill="#6B7280">
    <text x="40" y="424" font-weight="700" fill="#1A1A1A">Model tier:</text>
    <circle cx="138" cy="420" r="5" fill="#B4502F"/><text x="150" y="424">opus</text>
    <circle cx="208" cy="420" r="5" fill="#3F7D9B"/><text x="220" y="424">sonnet</text>
    <circle cx="290" cy="420" r="5" fill="#3F9B6B"/><text x="302" y="424">haiku</text>
    <text x="455" y="424" font-size="11">status → DONE · BLOCKED · NEEDS_CONTEXT · REJECTED</text>
  </g>
</svg>
