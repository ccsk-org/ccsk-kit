<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" width="900" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="slArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#D97757"/>
    </marker>
  </defs>

  <!-- card -->
  <rect x="2" y="2" width="896" height="376" rx="14" fill="#FAF9F7" stroke="#E7E2DC"/>

  <!-- title -->
  <text x="40" y="46" font-size="22" font-weight="700" fill="#1A1A1A">The Self-Learning Loop</text>
  <text x="40" y="70" font-size="14" fill="#6B7280">Pull-based, no hooks — work persists to <tspan font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#B4502F">.ccsk/</tspan> and compounds across sessions.</text>

  <!-- return arc: retro → rehydrate -->
  <path d="M786 150 C786 104, 114 104, 114 150" fill="none" stroke="#D97757" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#slArrow)"/>
  <text x="450" y="100" text-anchor="middle" font-size="13" fill="#D97757" font-weight="600">⟳ next session — re-read &amp; reconcile, so it compounds</text>

  <!-- nodes -->
  <!-- rehydrate -->
  <rect x="40" y="150" width="148" height="72" rx="10" fill="#FFFFFF" stroke="#E7E2DC"/>
  <text x="114" y="180" text-anchor="middle" font-size="14" font-weight="700" fill="#1A1A1A">rehydrate</text>
  <text x="114" y="200" text-anchor="middle" font-size="11" fill="#6B7280">read memory +</text>
  <text x="114" y="214" text-anchor="middle" font-size="11" fill="#6B7280">reconcile vs code</text>

  <!-- work -->
  <rect x="208" y="150" width="148" height="72" rx="10" fill="#FFFFFF" stroke="#E7E2DC"/>
  <text x="282" y="180" text-anchor="middle" font-size="14" font-weight="700" fill="#1A1A1A">work</text>
  <text x="282" y="200" text-anchor="middle" font-size="11" fill="#6B7280">build a slice</text>
  <text x="282" y="214" text-anchor="middle" font-size="11" fill="#6B7280">against the plan</text>

  <!-- journal -->
  <rect x="376" y="150" width="148" height="72" rx="10" fill="#FFFFFF" stroke="#E7E2DC"/>
  <text x="450" y="180" text-anchor="middle" font-size="14" font-weight="700" fill="#1A1A1A">journal</text>
  <text x="450" y="200" text-anchor="middle" font-size="11" fill="#6B7280">append lessons</text>
  <text x="450" y="214" text-anchor="middle" font-size="11" fill="#6B7280">continuously</text>

  <!-- Sign-off gate (dark, emphasis) -->
  <rect x="544" y="150" width="148" height="72" rx="10" fill="#1A1A1A"/>
  <text x="618" y="180" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">Sign-off gate</text>
  <text x="618" y="200" text-anchor="middle" font-size="11" fill="#E7C9BB">no DONE without</text>
  <text x="618" y="214" text-anchor="middle" font-size="11" fill="#E7C9BB">tests·review·memory</text>

  <!-- retro -->
  <rect x="712" y="150" width="148" height="72" rx="10" fill="#FFFFFF" stroke="#E7E2DC"/>
  <text x="786" y="180" text-anchor="middle" font-size="14" font-weight="700" fill="#1A1A1A">retro</text>
  <text x="786" y="200" text-anchor="middle" font-size="11" fill="#6B7280">compact MEMORY</text>
  <text x="786" y="214" text-anchor="middle" font-size="11" fill="#6B7280">at milestones</text>

  <!-- forward arrows -->
  <g stroke="#D97757" stroke-width="2">
    <line x1="190" y1="186" x2="206" y2="186" marker-end="url(#slArrow)"/>
    <line x1="358" y1="186" x2="374" y2="186" marker-end="url(#slArrow)"/>
    <line x1="526" y1="186" x2="542" y2="186" marker-end="url(#slArrow)"/>
    <line x1="694" y1="186" x2="710" y2="186" marker-end="url(#slArrow)"/>
  </g>

  <!-- .ccsk/ memory band -->
  <rect x="40" y="256" width="820" height="62" rx="10" fill="#F6E5DD" stroke="#E7C9BB"/>
  <text x="60" y="282" font-size="13" font-weight="700" fill="#B4502F" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">.ccsk/</text>
  <text x="60" y="302" font-size="12" fill="#6B7280">durable memory — gitignored by default, local-first</text>
  <g font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">
    <text x="430" y="282">plan ledger</text>
    <text x="540" y="282">journals</text>
    <text x="640" y="282">ADRs</text>
    <text x="730" y="282">retros</text>
    <text x="820" y="282">MEMORY.md</text>
  </g>
  <text x="630" y="302" text-anchor="middle" font-size="11" fill="#9AA0A6">01-PLAN.md is the single source of truth · MEMORY.md stays capped &amp; pointer-based</text>

  <text x="450" y="352" text-anchor="middle" font-size="12" fill="#9AA0A6">rehydrate → work → journal → Sign-off → retro → (next session)</text>
</svg>
